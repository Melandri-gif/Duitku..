<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuitKu - Smart Finance</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b6895b">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="#" class="navbar-logo">Duit<span>Ku</span>.</a>
        <div class="navbar-nav">
            <a href="#home">Home</a>
            <a href="#budget">Anggaran</a>
            <a href="#input">Catat</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <main class="content">
            <h3>Saldo Saat Ini</h3>
            <h1 id="total-balance">Rp 0</h1>
            <div class="summary-box">
                <div class="income"><p>Pemasukan</p><span id="total-income">Rp 0</span></div>
                <div class="expense"><p>Pengeluaran</p><span id="total-expense">Rp 0</span></div>
            </div>
        </main>
    </section>

    <section class="budget-section" id="budget">
        <div class="container-box">
            <h2><i data-feather="pie-chart"></i> Status Anggaran</h2>
            <div id="category-budget-list"></div>
            
            <div style="margin-top: 25px; border-top: 1px dashed #555; padding-top: 20px;">
                <p style="font-size: 0.85rem; margin-bottom: 12px; color: var(--primary);">Atur Limit Anggaran:</p>
                <div class="form-row">
                    <select id="budget-category-select">
                        <option value="Makan">Makan</option>
                        <option value="Liburan">Liburan</option>
                        <option value="Rumah">Rumah</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                    <input type="number" id="budget-amount-input" placeholder="Rp...">
                    <button onclick="setCategoryBudget()" class="btn-sm">Update</button>
                </div>
            </div>
        </div>
    </section>

    <section class="input-section" id="input">
        <div class="container-box">
            <h2><i data-feather="plus-circle"></i> Catat Transaksi</h2>
            <form id="transaction-form">
                <input type="text" id="desc" placeholder="Keterangan (ex: Beli Kopi)" required style="width: 100%; margin-bottom: 10px;">
                <input type="number" id="amount" placeholder="Jumlah (Rp)" required style="width: 100%; margin-bottom: 10px;">
                <div class="form-row">
                    <select id="trans-category">
                        <option value="Makan">Makan</option>
                        <option value="Liburan">Liburan</option>
                        <option value="Rumah">Rumah</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                    <select id="type">
                        <option value="expense">Pengeluaran</option>
                        <option value="income">Pemasukan</option>
                    </select>
                </div>
                <button type="submit" class="btn-main">Simpan</button>
            </form>
        </div>
    </section>

    <section class="history" id="history">
        <div class="container-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i data-feather="list"></i> Riwayat</h2>
                <button onclick="clearAll()" class="btn-reset">Hapus Semua</button>
            </div>
            <ul id="transaction-list" class="list"></ul>
        </div>
    </section>

    <footer>
        <div style="margin-bottom: 10px;">Status: <strong id="footer-status">AMAN</strong></div>
        <p>&copy; 2026 DuitKu. Created by Melandri.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        feather.replace();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
